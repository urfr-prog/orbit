<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fusion Square — Swipe Colonnes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:none}
body{background:#12131a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;user-select:none;color:rgba(180,180,190,0.5)}
canvas{width:100vw;height:100vh;display:block}
.hint{position:fixed;bottom:20px;font-size:0.7rem;letter-spacing:0.1em;opacity:0.4}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">SWIPE 8 DIRECTIONS ↗ → ↘ ↓ ↙ ← ↖ ↑</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setClearColor(0x12131a);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
camera.position.set(0, 0, 8);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ══ Rounded rect shape ══
function rrShape(w, h, r){
    const s = new THREE.Shape(), hw = w/2, hh = h/2;
    s.moveTo(-hw+r, -hh);
    s.lineTo(hw-r, -hh);
    s.quadraticCurveTo(hw, -hh, hw, -hh+r);
    s.lineTo(hw, hh-r);
    s.quadraticCurveTo(hw, hh, hw-r, hh);
    s.lineTo(-hw+r, hh);
    s.quadraticCurveTo(-hw, hh, -hw, hh-r);
    s.lineTo(-hw, -hh+r);
    s.quadraticCurveTo(-hw, -hh, -hw+r, -hh);
    return s;
}

// ══ Créer un carré 3D (extrudé) ══
const GRID = 5;
const SZ = 0.75, RAD = 0.14, DEPTH = 0.06, GAP = 0.90;

function mkSquare(num){
    const g = new THREE.Group();
    const shape = rrShape(SZ, SZ, RAD);
    const extGeo = new THREE.ExtrudeGeometry(shape, {depth: DEPTH, bevelEnabled: false});
    extGeo.translate(0, 0, -DEPTH/2);

    const faceMat = new THREE.MeshBasicMaterial({color: 0x0e0f18, transparent: true, opacity: 0.85});
    const sideMat = new THREE.MeshBasicMaterial({color: 0x141520, transparent: true, opacity: 0.5});
    const mesh = new THREE.Mesh(extGeo, [faceMat, sideMat]);
    g.add(mesh);

    const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(extGeo, 15),
        new THREE.LineBasicMaterial({color: 0xb4b4be, transparent: true, opacity: 0.35})
    );
    g.add(edges);

    // Numéro en texture
    if(num !== undefined){
        const cv = document.createElement('canvas');
        cv.width = 128; cv.height = 128;
        const ctx = cv.getContext('2d');
        ctx.fillStyle = 'rgba(180,190,210,0.75)';
        ctx.font = 'bold 52px -apple-system, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(String(num), 64, 64);
        const tex = new THREE.CanvasTexture(cv);
        const label = new THREE.Mesh(
            new THREE.PlaneGeometry(SZ * 0.8, SZ * 0.8),
            new THREE.MeshBasicMaterial({map: tex, transparent: true, depthWrite: false})
        );
        label.position.z = DEPTH / 2 + 0.002;
        g.add(label);
    }

    g.userData = {edges};
    return g;
}

// ══ Grille 5x5 — chaque carré indépendant ══
const squares = [];
const gridGroup = new THREE.Group();
scene.add(gridGroup);

let num = 0;
for(let row = 0; row < GRID; row++){
    for(let col = 0; col < GRID; col++){
        num++;
        const sq = mkSquare(num);
        const x = (col - 2) * GAP;
        const y = (2 - row) * GAP;
        sq.position.set(x, y, 0);
        gridGroup.add(sq);
        squares.push({mesh: sq, col, row, baseX: x, baseY: y});
    }
}

// ══ Étoiles (style ADAM) ══
[
    {n:60, d:[-6,-18], sp:1.5, sz:0.12, op:0.4, w:30},
    {n:120, d:[-18,-40], sp:0.8, sz:0.07, op:0.2, w:45},
    {n:200, d:[-40,-70], sp:0.3, sz:0.04, op:0.1, w:60}
].forEach(c => {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(c.n * 3);
    const spds = new Float32Array(c.n);
    for(let i = 0; i < c.n; i++){
        pos[i*3] = (Math.random()-0.5) * c.w;
        pos[i*3+1] = (Math.random()-0.5) * c.w * 0.7;
        pos[i*3+2] = c.d[0] + Math.random() * (c.d[1] - c.d[0]);
        spds[i] = c.sp * (0.5 + Math.random());
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({color: 0x7ec8e3, size: c.sz, transparent: true, opacity: c.op, depthWrite: false});
    const pts = new THREE.Points(geo, mat);
    scene.add(pts);
    pts.userData = {spds, cfg: c, geo};
});

// ══ Animation state ══
let animating = false;
let animAxis = ''; // 'h', 'v', 'd1' (↘↖), 'd2' (↙↗)
let animDir = 0;
let animTime = 0;

function easeInOutQuart(t){
    return t < 0.5 ? 8*t*t*t*t : 1 - Math.pow(-2*t+2, 4)/2;
}

// ── H/V ──
function getHVPairs(){
    return [
        {indices:[0,4], arc:1.5, delay:0.08, duration:0.65},
        {indices:[1,3], arc:0.8, delay:0.0,  duration:0.50}
    ];
}

let activePairs = [];
let isDiag = false;

// ── DIAG : pré-calcul des cibles ──
// Chaque carré stocke sa cible (position monde + nouveau col/row)
let diagTargets = new Map();
// Délai par anti-diag index (0..8)
const DIAG_DURATION = 0.55;
const DIAG_WAVE_DELAY = 0.045; // délai entre chaque vague
const DIAG_ARC = 1.0;

function startAnim(axis, dir){
    if(animating) return;
    animating = true;
    animAxis = axis;
    animDir = dir;
    animTime = 0;
    isDiag = (axis === 'd1' || axis === 'd2');

    squares.forEach(s => {
        s.startX = s.mesh.position.x;
        s.startY = s.mesh.position.y;
        s.startZ = 0;
    });

    if(isDiag){
        diagTargets.clear();

        // Regrouper les carrés par anti-diag
        // d1: anti-diag = col + row (axe ↘)
        // d2: anti-diag = col + (4 - row) = col - row + 4 (axe ↗)
        function adiagOf(s){
            return axis === 'd1' ? (s.col + s.row) : (s.col - s.row + 4);
        }

        // Construire les listes par anti-diag
        const adiags = {};
        squares.forEach(s => {
            const k = adiagOf(s);
            if(!adiags[k]) adiags[k] = [];
            adiags[k].push(s);
        });

        // Trier chaque anti-diag par position le long de la diag
        // d1: trier par col croissant
        // d2: trier par col croissant
        for(const k in adiags){
            adiags[k].sort((a, b) => a.col - b.col);
        }

        // Pour chaque anti-diag k, son miroir est 8-k
        // Le bloc en position relative i de la diag k va à la position relative i de la diag 8-k
        for(let k = 0; k <= 8; k++){
            const mk = 8 - k;
            if(k === mk) continue; // diag centrale, ne bouge pas
            if(k > mk) continue;   // déjà traité dans l'autre sens
            const listA = adiags[k] || [];
            const listB = adiags[mk] || [];
            // Les deux listes ont la même longueur
            for(let i = 0; i < listA.length; i++){
                const sa = listA[i];
                const sb = listB[i];
                diagTargets.set(sa, {
                    targetX: sb.startX, targetY: sb.startY,
                    newCol: sb.col, newRow: sb.row
                });
                diagTargets.set(sb, {
                    targetX: sa.startX, targetY: sa.startY,
                    newCol: sa.col, newRow: sa.row
                });
            }
        }
    } else {
        activePairs = getHVPairs();
    }
}

function getDiagDelay(s){
    // Vague par anti-diag, dans le sens du swipe
    let k;
    if(animAxis === 'd1') k = s.col + s.row;
    else k = s.col - s.row + 4;
    // Sens du swipe: dir=+1 (↘ ou ↗) → la diag 0 part en premier
    // dir=-1 (↖ ou ↙) → la diag 8 part en premier
    const wave = (animDir === 1) ? k : (8 - k);
    return wave * DIAG_WAVE_DELAY;
}

function updateAnim(dt){
    if(!animating) return;
    animTime += dt;
    let allDone = true;

    if(isDiag){
        squares.forEach(s => {
            const tgt = diagTargets.get(s);
            if(!tgt) return; // diag centrale

            const delay = getDiagDelay(s);
            const localTime = animTime - delay;
            if(localTime < 0){ allDone = false; return; }

            const t = Math.min(localTime / DIAG_DURATION, 1);
            if(t < 1) allDone = false;
            const e = easeInOutQuart(t);

            // Dessus/dessous: le bloc qui va dans le sens du swipe passe au-dessus
            let k = (animAxis === 'd1') ? (s.col + s.row) : (s.col - s.row + 4);
            const goesForward = (animDir === 1) ? (k < 4) : (k > 4);
            const zSign = goesForward ? 1 : -1;
            const arc = Math.sin(e * Math.PI) * DIAG_ARC * zSign;

            s.mesh.position.x = s.startX + (tgt.targetX - s.startX) * e;
            s.mesh.position.y = s.startY + (tgt.targetY - s.startY) * e;
            s.mesh.position.z = arc;
        });

        if(allDone){
            squares.forEach(s => {
                const tgt = diagTargets.get(s);
                if(!tgt) return;
                s.mesh.position.z = 0;
                s.baseX = s.mesh.position.x;
                s.baseY = s.mesh.position.y;
                s.col = tgt.newCol;
                s.row = tgt.newRow;
            });
            animating = false;
        }
    } else {
        // H / V
        squares.forEach(s => {
            const idx = animAxis === 'h' ? s.col : s.row;
            let pi = -1;
            for(let p = 0; p < activePairs.length; p++){
                const pr = activePairs[p];
                if(idx === pr.indices[0] || idx === pr.indices[1]){ pi = p; break; }
            }
            if(pi < 0) return;

            const pr = activePairs[pi];
            const localTime = animTime - pr.delay;
            if(localTime < 0){ allDone = false; return; }

            const t = Math.min(localTime / pr.duration, 1);
            if(t < 1) allDone = false;
            const e = easeInOutQuart(t);

            const [a, b] = pr.indices;
            const isOver = (animDir === 1) ? (idx === b) : (idx === a);
            const zSign = isOver ? 1 : -1;
            const arc = Math.sin(e * Math.PI) * pr.arc * zSign;

            if(animAxis === 'h'){
                const targetX = -s.startX;
                s.mesh.position.x = s.startX + (targetX - s.startX) * e;
                s.mesh.position.z = arc;
            } else {
                const targetY = -s.startY;
                s.mesh.position.y = s.startY + (targetY - s.startY) * e;
                s.mesh.position.z = arc;
            }
        });

        if(allDone){
            squares.forEach(s => {
                const idx = animAxis === 'h' ? s.col : s.row;
                let pi = -1;
                for(let p = 0; p < activePairs.length; p++){
                    const pr = activePairs[p];
                    if(idx === pr.indices[0] || idx === pr.indices[1]){ pi = p; break; }
                }
                if(pi < 0) return;
                s.mesh.position.z = 0;
                const [a, b] = activePairs[pi].indices;
                if(animAxis === 'h'){
                    s.baseX = s.mesh.position.x;
                    s.col = (s.col === a) ? b : a;
                } else {
                    s.baseY = s.mesh.position.y;
                    s.row = (s.row === a) ? b : a;
                }
            });
            animating = false;
        }
    }
}

// ══ Pointer / swipe ══
let pStart = null;
window.addEventListener('pointerdown', e => {
    if(animating) return;
    pStart = {x: e.clientX, y: e.clientY};
});
window.addEventListener('pointerup', e => {
    if(!pStart || animating) return;
    const dx = e.clientX - pStart.x;
    const dy = e.clientY - pStart.y;
    const dist = Math.hypot(dx, dy);
    if(dist < 40){ pStart = null; return; }

    const angle = Math.atan2(dy, dx);
    const deg = ((angle * 180 / Math.PI) + 360) % 360;

    if(deg < 22.5 || deg >= 337.5)        startAnim('h', 1);   // →
    else if(deg < 67.5)                    startAnim('d1', 1);  // ↘
    else if(deg < 112.5)                   startAnim('v', 1);   // ↓
    else if(deg < 157.5)                   startAnim('d2', -1); // ↙
    else if(deg < 202.5)                   startAnim('h', -1);  // ←
    else if(deg < 247.5)                   startAnim('d1', -1); // ↖
    else if(deg < 292.5)                   startAnim('v', -1);  // ↑
    else                                    startAnim('d2', 1);  // ↗

    pStart = null;
});
window.addEventListener('pointercancel', () => { pStart = null; });

// Clavier
document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight')  startAnim('h', 1);
    else if(e.key === 'ArrowLeft')  startAnim('h', -1);
    else if(e.key === 'ArrowDown')  startAnim('v', 1);
    else if(e.key === 'ArrowUp')    startAnim('v', -1);
});

// ══ Render loop ══
const clock = new THREE.Clock();
function animate(){
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const t = clock.getElapsedTime();

    updateAnim(dt);

    // Étoiles
    scene.children.forEach(child => {
        if(child.isPoints && child.userData.cfg){
            const u = child.userData;
            const p = u.geo.attributes.position.array;
            for(let i = 0; i < u.cfg.n; i++){
                p[i*3+2] += u.spds[i] * dt;
                if(p[i*3+2] > u.cfg.d[0] + 5){
                    p[i*3+2] = u.cfg.d[1];
                    p[i*3] = (Math.random()-0.5) * u.cfg.w;
                    p[i*3+1] = (Math.random()-0.5) * u.cfg.w * 0.7;
                }
            }
            u.geo.attributes.position.needsUpdate = true;
        }
    });

    // Subtile respiration des bords
    squares.forEach(s => {
        const phase = t * 1.2 + s.col * 1.5 + s.row * 0.8;
        s.mesh.userData.edges.material.opacity = 0.25 + 0.1 * Math.sin(phase);
    });

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>

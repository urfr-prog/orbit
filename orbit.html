<style>

<body>
<canvas id="c"></canvas>
<div class="hint">POINT + SWIPE → LOCAL FLIP | DIAG=SQUARE | H/V=LINE MIRROR</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════
//  ADAM DOMINO SYSTEM
// ══════════════════════════════════════
const BANK=['chevron','circle','twoCircles','line','threeLines','twoPoints','square','wave'];
const STATE_ORDER=['white','silver','gold','emerald','cosmic','supernovae'];
const ICO={
 chevron:{f1:'M20 32L45 12L70 32',f2:'M20 12L45 32L70 12',t:'path'},
 circle:{f1:'45,22,12',f2:'45,22,12',t:'circle'},
 twoCircles:{f1:'30,22,8|60,22,8',f2:'30,22,8|60,22,8',t:'circles'},
 line:{f1:'15,22,75,22',f2:'15,22,75,22',t:'line'},
 threeLines:{f1:'25,10,25,34|45,10,45,34|65,10,65,34',f2:'25,10,25,34|45,10,45,34|65,10,65,34',t:'lines'},
 twoPoints:{f1:'30,22,4|60,22,4',f2:'30,22,4|60,22,4',t:'points'},
 square:{f1:'25,10,40,24,3',f2:'25,10,40,24,3',t:'rect'},
 wave:{f1:'M10 22Q28 6 45 22Q62 38 80 22',f2:'M10 22Q28 6 45 22Q62 38 80 22',t:'path'}
};
function renderIcoSVG(name,f2){
 const d=ICO[name];if(!d)return'';const data=f2?d.f2:d.f1;
 if(d.t==='path')return`<path class="i" d="${data}"/>`;
 if(d.t==='circle'){const[cx,cy,r]=data.split(',');return`<circle class="i" cx="${cx}" cy="${cy}" r="${r}"/>`;}
 if(d.t==='line'){const[x1,y1,x2,y2]=data.split(',');return`<line class="i" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}"/>`;}
 if(d.t==='rect'){const[x,y,w,h,rx]=data.split(',');return`<rect class="i" x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}"/>`;}
 return data.split('|').map(p=>{const v=p.split(',');
  if(d.t==='circles')return`<circle class="i" cx="${v[0]}" cy="${v[1]}" r="${v[2]}"/>`;
  if(d.t==='points')return`<circle class="p" cx="${v[0]}" cy="${v[1]}" r="${v[2]}"/>`;
  return`<line class="i" x1="${v[0]}" y1="${v[1]}" x2="${v[2]}" y2="${v[3]}"/>`;
 }).join('');
}
const STC={
 white:{border:'rgba(180,180,190,0.35)',icon:'rgba(180,180,190,0.35)',pt:'rgba(180,180,190,0.35)',sep:'rgba(180,180,190,0.3)',flt:'',bw:1},
 silver:{border:'rgba(6,182,212,0.6)',icon:'#22d3ee',pt:'#22d3ee',sep:'rgba(34,211,238,0.4)',flt:'drop-shadow(0 0 2px rgba(34,211,238,0.4))',bw:1},
 gold:{border:'rgba(255,215,0,0.7)',icon:'#ffd700',pt:'#ffd700',sep:'rgba(255,215,0,0.4)',flt:'drop-shadow(0 0 4px rgba(255,215,0,0.6))',bw:1},
 emerald:{border:'rgba(52,211,153,0.9)',icon:'#34d399',pt:'#34d399',sep:'rgba(52,211,153,0.6)',flt:'drop-shadow(0 0 6px rgba(52,211,153,0.9))',bw:1},
 cosmic:{border:'rgba(131,56,236,0.7)',icon:'#c4b5fd',pt:'#c4b5fd',sep:'rgba(196,181,253,0.6)',flt:'drop-shadow(0 0 6px rgba(131,56,236,0.7))',bw:2},
 supernovae:{border:'rgba(255,140,0,0.7)',icon:'#ffeb3b',pt:'#ffeb3b',sep:'rgba(255,235,59,0.6)',flt:'drop-shadow(0 0 6px rgba(255,215,0,0.7))',bw:3}
};
const _tc={};
function getDominoTex(f1,f2,rot,state){
 const k=f1+'|'+f2+'|'+rot+'|'+state;if(_tc[k])return _tc[k];
 const c=STC[state]||STC.white,r=((rot||0)%360+360)%360;
 const top=renderIcoSVG(f1,false),bot=renderIcoSVG(f2,true);
 const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 90">
  <style>.i{stroke:${c.icon};stroke-width:2;stroke-linecap:round;stroke-linejoin:round;fill:none;${c.flt?'filter:'+c.flt:''}}.p{fill:${c.pt};${c.flt?'filter:'+c.flt:''}}.s{stroke:${c.sep};stroke-width:1}</style>
  <g transform="rotate(${r},45,45)"><line class="s" x1="0" y1="45" x2="90" y2="45"/><g>${top}</g><g transform="translate(0,45)">${bot}</g></g></svg>`;
 const S=256,cv=document.createElement('canvas');cv.width=S;cv.height=S;
 const ctx=cv.getContext('2d');
 const tex=new THREE.CanvasTexture(cv);tex.needsUpdate=false;
 const blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
 const url=URL.createObjectURL(blob);
 const img=new Image();
 img.onload=()=>{
  const m=4,rd=36;
  ctx.fillStyle='rgba(18,19,26,0.95)';
  ctx.beginPath();ctx.moveTo(m+rd,m);ctx.lineTo(S-m-rd,m);ctx.quadraticCurveTo(S-m,m,S-m,m+rd);ctx.lineTo(S-m,S-m-rd);ctx.quadraticCurveTo(S-m,S-m,S-m-rd,S-m);ctx.lineTo(m+rd,S-m);ctx.quadraticCurveTo(m,S-m,m,S-m-rd);ctx.lineTo(m,m+rd);ctx.quadraticCurveTo(m,m,m+rd,m);ctx.closePath();ctx.fill();
  ctx.strokeStyle=c.border;ctx.lineWidth=c.bw;
  ctx.beginPath();ctx.moveTo(m+rd,m);ctx.lineTo(S-m-rd,m);ctx.quadraticCurveTo(S-m,m,S-m,m+rd);ctx.lineTo(S-m,S-m-rd);ctx.quadraticCurveTo(S-m,S-m,S-m-rd,S-m);ctx.lineTo(m+rd,S-m);ctx.quadraticCurveTo(m,S-m,m,S-m-rd);ctx.lineTo(m,m+rd);ctx.quadraticCurveTo(m,m,m+rd,m);ctx.closePath();ctx.stroke();
  ctx.drawImage(img,m+2,m+2,S-m*2-4,S-m*2-4);
  tex.needsUpdate=true;URL.revokeObjectURL(url);
 };
 img.src=url;_tc[k]=tex;return tex;
}

// ══════════════════════════════════════
//  COSMIC / SUPERNOVAE DRAWING
// ══════════════════════════════════════
function drawCosmicRing(cv,angle){
 const S=cv.width,ctx=cv.getContext('2d');ctx.clearRect(0,0,S,S);
 const cx=S/2,cy=S/2;
 const grad=ctx.createConicGradient(angle,cx,cy);
 ['#ff006e','#8338ec','#06b6d4','#34d399','#ffd700','#ff006e'].forEach((c,i)=>grad.addColorStop(i/5,c));
 const lw=5,m=4,rd=36;ctx.strokeStyle=grad;ctx.lineWidth=lw;
 ctx.beginPath();ctx.moveTo(m+rd,m);ctx.lineTo(S-m-rd,m);ctx.quadraticCurveTo(S-m,m,S-m,m+rd);ctx.lineTo(S-m,S-m-rd);ctx.quadraticCurveTo(S-m,S-m,S-m-rd,S-m);ctx.lineTo(m+rd,S-m);ctx.quadraticCurveTo(m,S-m,m,S-m-rd);ctx.lineTo(m,m+rd);ctx.quadraticCurveTo(m,m,m+rd,m);ctx.closePath();ctx.stroke();
}
function drawSupernovaeRing(cv,angle){
 const S=cv.width,ctx=cv.getContext('2d');ctx.clearRect(0,0,S,S);
 const cx=S/2,cy=S/2;
 const grad=ctx.createConicGradient(angle,cx,cy);
 ['#ff4500','#ff8c00','#ffd700','#ffff00','#ff8c00','#ff4500'].forEach((c,i)=>grad.addColorStop(i/5,c));
 const lw=6,m=4,rd=36;ctx.strokeStyle=grad;ctx.lineWidth=lw;
 ctx.beginPath();ctx.moveTo(m+rd,m);ctx.lineTo(S-m-rd,m);ctx.quadraticCurveTo(S-m,m,S-m,m+rd);ctx.lineTo(S-m,S-m-rd);ctx.quadraticCurveTo(S-m,S-m,S-m-rd,S-m);ctx.lineTo(m+rd,S-m);ctx.quadraticCurveTo(m,S-m,m,S-m-rd);ctx.lineTo(m,m+rd);ctx.quadraticCurveTo(m,m,m+rd,m);ctx.closePath();ctx.stroke();
}
function drawHalo(cv,r,g,b,phase,intensity){
 const S=cv.width,cx=S/2,ctx=cv.getContext('2d');ctx.clearRect(0,0,S,S);
 const pulse=0.5+0.5*Math.sin(phase);const a=intensity*(0.6+pulse*0.4);
 const grd=ctx.createRadialGradient(cx,cx,S*0.15,cx,cx,cx);
 grd.addColorStop(0,`rgba(${r},${g},${b},${(a*0.6).toFixed(2)})`);
 grd.addColorStop(0.4,`rgba(${r},${g},${b},${(a*0.3).toFixed(2)})`);
 grd.addColorStop(0.7,`rgba(${r},${g},${b},${(a*0.1).toFixed(2)})`);
 grd.addColorStop(1,`rgba(${r},${g},${b},0)`);
 ctx.fillStyle=grd;ctx.fillRect(0,0,S,S);
}

// ══════════════════════════════════════
//  GRID CONSTANTS
// ══════════════════════════════════════
const GRID=5, SZ=0.75, RAD=0.14, DEPTH=0.06, GGAP=0.90, SAT_LIFT=0.08;

// ══════════════════════════════════════
//  THREE.JS SETUP (identique v2)
// ══════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setClearColor(0x12131a);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const raycaster = new THREE.Raycaster();
const pointerNDC = new THREE.Vector2();

function resize(){
 const w=window.innerWidth,h=window.innerHeight;
 renderer.setSize(w,h);camera.aspect=w/h;camera.updateProjectionMatrix();
}
camera.position.set(0, 0, 8);
resize();window.addEventListener('resize',resize);

// ══ Rounded rect shape ══
function rrS(w,h,r){
 const s=new THREE.Shape(),hw=w/2,hh=h/2;
 s.moveTo(-hw+r,-hh);s.lineTo(hw-r,-hh);s.quadraticCurveTo(hw,-hh,hw,-hh+r);
 s.lineTo(hw,hh-r);s.quadraticCurveTo(hw,hh,hw-r,hh);
 s.lineTo(-hw+r,hh);s.quadraticCurveTo(-hw,hh,-hw,hh-r);
 s.lineTo(-hw,-hh+r);s.quadraticCurveTo(-hw,-hh,-hw+r,-hh);return s;
}

// ══════════════════════════════════════
//  SATELLITE (DOMINO) BUILDER (identique v2)
// ══════════════════════════════════════
function mkSat(){
 const g=new THREE.Group();
 const n=new THREE.Mesh(new THREE.PlaneGeometry(SZ,SZ),new THREE.MeshBasicMaterial({transparent:true,side:THREE.DoubleSide}));
 n.position.z=DEPTH/2+0.001;g.add(n);
 const bg=new THREE.ExtrudeGeometry(rrS(SZ,SZ,RAD),{depth:DEPTH,bevelEnabled:false});bg.translate(0,0,-DEPTH/2);
 g.add(new THREE.Mesh(bg,[new THREE.MeshBasicMaterial({color:0x0e0f18,transparent:true,opacity:0.3}),new THREE.MeshBasicMaterial({color:0x141520,transparent:true,opacity:0.45})]));
 const el=new THREE.LineSegments(new THREE.EdgesGeometry(bg,15),new THREE.LineBasicMaterial({color:0xb4b4be,transparent:true,opacity:0.15}));g.add(el);
 const sc=document.createElement('canvas');sc.width=128;sc.height=128;const sx=sc.getContext('2d');
 const sg=sx.createRadialGradient(64,64,10,64,64,60);sg.addColorStop(0,'rgba(0,0,0,0.3)');sg.addColorStop(0.5,'rgba(0,0,0,0.1)');sg.addColorStop(1,'rgba(0,0,0,0)');sx.fillStyle=sg;sx.fillRect(0,0,128,128);
 const sm=new THREE.Mesh(new THREE.PlaneGeometry(SZ*1.2,SZ*1.2),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(sc),transparent:true,opacity:0.45,depthWrite:false}));sm.position.z=-DEPTH/2-SAT_LIFT+0.005;g.add(sm);
 const gl=new THREE.Mesh(new THREE.ShapeGeometry(rrS(SZ+0.06,SZ+0.06,RAD+0.03)),new THREE.MeshBasicMaterial({color:0x7ec8e3,transparent:true,opacity:0}));gl.position.z=-DEPTH/2-0.005;g.add(gl);
 const rCv=document.createElement('canvas');rCv.width=256;rCv.height=256;
 const rTex=new THREE.CanvasTexture(rCv);
 const rMesh=new THREE.Mesh(new THREE.PlaneGeometry(SZ,SZ),new THREE.MeshBasicMaterial({map:rTex,transparent:true,opacity:0,depthWrite:false,side:THREE.DoubleSide}));
 rMesh.position.z=DEPTH/2+0.003;g.add(rMesh);
 const gCv=document.createElement('canvas');gCv.width=128;gCv.height=128;
 const gTex=new THREE.CanvasTexture(gCv);
 const gSpr=new THREE.Sprite(new THREE.SpriteMaterial({map:gTex,transparent:true,opacity:0,depthWrite:false}));
 gSpr.scale.set(SZ*1.6,SZ*1.6,1);g.add(gSpr);
 g.userData={numMesh:n,edgeLines:el,glowMesh:gl,ringCanvas:rCv,ringTex:rTex,ringMesh:rMesh,haloCanvas:gCv,haloTex:gTex,haloSprite:gSpr};
 return g;
}

// ══════════════════════════════════════
//  DOMINO DATA & GRID (identique v2)
// ══════════════════════════════════════
const domData=[];
const squares=[];
const gridGroup=new THREE.Group();
scene.add(gridGroup);

function srand(seed){let s=seed;return()=>{s=(s*1103515245+12345)&0x7fffffff;return s/0x7fffffff;};}
const rng=srand(42424);

const statePool=['white','white','white','white','white','white','white','white','white','white',
 'silver','silver','silver','gold','gold','emerald','emerald','cosmic','supernovae'];

for(let row=0;row<GRID;row++){
 for(let col=0;col<GRID;col++){
  const idx=row*GRID+col;
  const f1=BANK[Math.floor(rng()*BANK.length)];
  const f2=BANK[Math.floor(rng()*BANK.length)];
  const rot=((col+row)%2===0)?0:90;
  const st=statePool[Math.floor(rng()*statePool.length)];
  domData.push({face1:f1,face2:f2,rotation:rot,state:st});

  const sat=mkSat();
  const x=(col-2)*GGAP, y=(2-row)*GGAP;
  sat.position.set(x,y,0);
  gridGroup.add(sat);

  const tex=getDominoTex(f1,f2,rot,st);
  sat.userData.numMesh.material.map=tex;
  sat.userData.numMesh.material.needsUpdate=true;

  squares.push({mesh:sat, col, row, baseX:x, baseY:y, domIdx:idx});
 }
}

function updateSatTex(s){
 const d=domData[s.domIdx];
 const tex=getDominoTex(d.face1,d.face2,d.rotation,d.state);
 s.mesh.userData.numMesh.material.map=tex;
 s.mesh.userData.numMesh.material.needsUpdate=true;
}

// ══ Étoiles (identique v2) ══
[
 {n:60,d:[-6,-18],sp:1.5,sz:0.12,op:0.4,w:30},
 {n:120,d:[-18,-40],sp:0.8,sz:0.07,op:0.2,w:45},
 {n:200,d:[-40,-70],sp:0.3,sz:0.04,op:0.1,w:60}
].forEach(c=>{
 const geo=new THREE.BufferGeometry();
 const pos=new Float32Array(c.n*3),spds=new Float32Array(c.n);
 for(let i=0;i<c.n;i++){pos[i*3]=(Math.random()-0.5)*c.w;pos[i*3+1]=(Math.random()-0.5)*c.w*0.7;pos[i*3+2]=c.d[0]+Math.random()*(c.d[1]-c.d[0]);spds[i]=c.sp*(0.5+Math.random());}
 geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
 const mat=new THREE.PointsMaterial({color:0x7ec8e3,size:c.sz,transparent:true,opacity:c.op,depthWrite:false});
 const pts=new THREE.Points(geo,mat);scene.add(pts);
 pts.userData={spds,cfg:c,geo};
});

// ══════════════════════════════════════
//  RAYCAST HIT TEST
// ══════════════════════════════════════
function hitTest(clientX, clientY){
 pointerNDC.x = (clientX / window.innerWidth) * 2 - 1;
 pointerNDC.y = -(clientY / window.innerHeight) * 2 + 1;
 raycaster.setFromCamera(pointerNDC, camera);
 const targets = squares.map(s => s.mesh.userData.numMesh);
 const hits = raycaster.intersectObjects(targets, false);
 if(hits.length === 0) return null;
 const hitMesh = hits[0].object;
 return squares.find(s => s.mesh.userData.numMesh === hitMesh) || null;
}

// ══════════════════════════════════════
//  ANIMATION STATE
// ══════════════════════════════════════
let animating=false, animTime=0;
const ANIM_DURATION=0.50, ANIM_ARC=0.8;
function easeInOutQuart(t){return t<0.5?8*t*t*t*t:1-Math.pow(-2*t+2,4)/2;}

// Each animating square: {sq, startX, startY, targetX, targetY, newCol, newRow, arcSign, delay}
let animItems=[];

function finishAnim(){
 // Swap domIdx between mirror pairs — meshes return to their grid slot
 animPairs.forEach(([a,b])=>{
  const tmp=a.domIdx; a.domIdx=b.domIdx; b.domIdx=tmp;
 });
 // Reset all meshes to their fixed grid position and update textures
 animItems.forEach(item=>{
  const s=item.sq;
  s.mesh.position.x=s.baseX;
  s.mesh.position.y=s.baseY;
  s.mesh.position.z=0;
  updateSatTex(s);
 });
 animating=false;animItems=[];animPairs=[];
}

let animPairs=[];

function updateAnim(dt){
 if(!animating)return;
 animTime+=dt;
 let allDone=true;
 animItems.forEach(item=>{
  const lt=animTime-item.delay;
  if(lt<0){allDone=false;return;}
  const t=Math.min(lt/ANIM_DURATION,1);
  if(t<1)allDone=false;
  const e=easeInOutQuart(t);
  const arc=Math.sin(e*Math.PI)*ANIM_ARC*item.arcSign;
  item.sq.mesh.position.x=item.startX+(item.targetX-item.startX)*e;
  item.sq.mesh.position.y=item.startY+(item.targetY-item.startY)*e;
  item.sq.mesh.position.z=arc;
 });
 if(allDone) finishAnim();
}

// ══════════════════════════════════════
//  H/V LINE MIRROR
// ══════════════════════════════════════
function startLineMirror(originSq, axis, dir, count){
 if(animating||count<3)return;

 const lineSqs=[];
 let col=originSq.col, row=originSq.row;
 let dc=0, dr=0;
 if(axis==='h'){ dc=dir; }
 else { dr=dir; }

 for(let i=0;i<count;i++){
  const c=col+dc*i, r=row+dr*i;
  if(c<0||c>=GRID||r<0||r>=GRID)break;
  const sq=squares.find(s=>s.col===c&&s.row===r);
  if(sq) lineSqs.push(sq);
 }

 if(lineSqs.length<2)return;
 const n=lineSqs.length;

 animating=true;animTime=0;animItems=[];animPairs=[];

 for(let i=0;i<Math.floor(n/2);i++){
  const a=lineSqs[i], b=lineSqs[n-1-i];
  const waveDelay=i*0.04;

  animItems.push({
   sq:a, startX:a.baseX, startY:a.baseY,
   targetX:b.baseX, targetY:b.baseY,
   arcSign:1, delay:waveDelay
  });
  animItems.push({
   sq:b, startX:b.baseX, startY:b.baseY,
   targetX:a.baseX, targetY:a.baseY,
   arcSign:-1, delay:waveDelay
  });
  animPairs.push([a,b]);
 }
}

// ══════════════════════════════════════
//  DIAGONAL LOCAL FLIP (NxN)
// ══════════════════════════════════════
function startLocalDiag(originSq, axis, dir, size){
 if(animating||size<3)return;

 let anchorCol=originSq.col, anchorRow=originSq.row;

 let colDir,rowDir;
 if(axis==='d1'&&dir===1){colDir=1;rowDir=1;}
 else if(axis==='d1'&&dir===-1){colDir=-1;rowDir=-1;}
 else if(axis==='d2'&&dir===-1){colDir=1;rowDir=-1;}
 else {colDir=-1;rowDir=1;}

 let c0=anchorCol, c1=anchorCol+(size-1)*colDir;
 let r0=anchorRow, r1=anchorRow+(size-1)*rowDir;
 let minCol=Math.min(c0,c1),maxCol=Math.max(c0,c1);
 let minRow=Math.min(r0,r1),maxRow=Math.max(r0,r1);

 if(minCol<0){maxCol+=(-minCol);minCol=0;}
 if(minRow<0){maxRow+=(-minRow);minRow=0;}
 if(maxCol>GRID-1){minCol-=(maxCol-(GRID-1));maxCol=GRID-1;}
 if(maxRow>GRID-1){minRow-=(maxRow-(GRID-1));maxRow=GRID-1;}
 minCol=Math.max(0,minCol);minRow=Math.max(0,minRow);
 maxCol=Math.min(GRID-1,maxCol);maxRow=Math.min(GRID-1,maxRow);

 const zoneW=maxCol-minCol+1,zoneH=maxRow-minRow+1;
 const zoneSize=Math.min(zoneW,zoneH);
 if(zoneSize<2)return;
 maxCol=minCol+zoneSize-1;
 maxRow=minRow+zoneSize-1;

 const zoneSqs=squares.filter(s=>s.col>=minCol&&s.col<=maxCol&&s.row>=minRow&&s.row<=maxRow);

 function adiagOf(s){
  const lc=s.col-minCol,lr=s.row-minRow;
  return axis==='d1'?(lc+lr):(lc-lr+(zoneSize-1));
 }
 const maxAdiag=2*(zoneSize-1);
 const adiags={};
 zoneSqs.forEach(s=>{const k=adiagOf(s);if(!adiags[k])adiags[k]=[];adiags[k].push(s);});
 for(const k in adiags)adiags[k].sort((a,b)=>a.col-b.col);

 animating=true;animTime=0;animItems=[];animPairs=[];

 for(let k=0;k<=maxAdiag;k++){
  const mk=maxAdiag-k;
  if(k>=mk)continue;
  const lA=adiags[k]||[],lB=adiags[mk]||[];
  const waveDelay=k*0.04;
  for(let i=0;i<Math.min(lA.length,lB.length);i++){
   const a=lA[i],b=lB[i];
   animItems.push({
    sq:a, startX:a.baseX, startY:a.baseY,
    targetX:b.baseX, targetY:b.baseY,
    arcSign:1, delay:waveDelay
   });
   animItems.push({
    sq:b, startX:b.baseX, startY:b.baseY,
    targetX:a.baseX, targetY:a.baseY,
    arcSign:-1, delay:waveDelay
   });
   animPairs.push([a,b]);
  }
 }
}

// ══════════════════════════════════════
//  POINTER / SWIPE
// ══════════════════════════════════════
let pStart=null,startSq=null;

window.addEventListener('pointerdown',e=>{
 if(animating)return;
 pStart={x:e.clientX,y:e.clientY};
 startSq=hitTest(e.clientX,e.clientY);
});

window.addEventListener('pointerup',e=>{
 if(!pStart||animating)return;
 const dx=e.clientX-pStart.x,dy=e.clientY-pStart.y;
 const dist=Math.hypot(dx,dy);
 if(dist<25||!startSq){pStart=null;startSq=null;return;}

 // Determine axis from angle
 const deg=((Math.atan2(dy,dx)*180/Math.PI)+360)%360;
 let axis,dir;
 if(deg<22.5||deg>=337.5){axis='h';dir=1;}
 else if(deg<67.5){axis='d1';dir=1;}
 else if(deg<112.5){axis='v';dir=1;}
 else if(deg<157.5){axis='d2';dir=1;}
 else if(deg<202.5){axis='h';dir=-1;}
 else if(deg<247.5){axis='d1';dir=-1;}
 else if(deg<292.5){axis='v';dir=-1;}
 else {axis='d2';dir=-1;}

 // Calculate count from pixel distance using actual projected cell size
 // Project two adjacent grid positions to screen to get real pixel spacing
 const v0 = new THREE.Vector3(0, 0, 0).project(camera);
 const v1 = new THREE.Vector3(GGAP, 0, 0).project(camera);
 const cellPx = Math.abs(v1.x - v0.x) * window.innerWidth / 2;
 // For diagonals, the pixel distance per cell is √2 longer
 const stepPx = (axis==='d1'||axis==='d2') ? cellPx * Math.SQRT2 : cellPx;
 const count = Math.max(3, Math.min(GRID, Math.floor(dist / stepPx) + 1));

 if(axis==='d1'||axis==='d2'){
  startLocalDiag(startSq,axis,dir,count);
 } else {
  startLineMirror(startSq,axis,dir,count);
 }
 pStart=null;startSq=null;
});

window.addEventListener('pointercancel',()=>{pStart=null;startSq=null;});

});

const clock=new THREE.Clock();
function animate(){
 requestAnimationFrame(animate);
 const dt=clock.getDelta(),t=clock.getElapsedTime();
 updateAnim(dt);

 squares.forEach((s,si)=>{
  const d=domData[s.domIdx],st=d.state,ud=s.mesh.userData;
  if(st==='cosmic'){
   drawCosmicRing(ud.ringCanvas,t*Math.PI/2);ud.ringTex.needsUpdate=true;ud.ringMesh.material.opacity=1;
   drawHalo(ud.haloCanvas,131,56,236,t*Math.PI,0.5);ud.haloTex.needsUpdate=true;ud.haloSprite.material.opacity=0.8;
   const cp=t*1.5+si;ud.edgeLines.material.color.setRGB(0.5+Math.sin(cp)*0.3,Math.sin(cp+2.1)*0.3+0.2,0.5+Math.sin(cp+4.2)*0.3);ud.edgeLines.material.opacity=0.5+Math.sin(t*2)*0.15;
   ud.glowMesh.material.color.set(0x8338ec);ud.glowMesh.material.opacity=0.2+0.12*Math.sin(t*2+si);
  } else if(st==='supernovae'){
   drawSupernovaeRing(ud.ringCanvas,t*Math.PI*2/3);ud.ringTex.needsUpdate=true;ud.ringMesh.material.opacity=1;
   drawHalo(ud.haloCanvas,255,140,0,t*Math.PI*1.25,0.6);ud.haloTex.needsUpdate=true;ud.haloSprite.material.opacity=0.9;
   ud.edgeLines.material.color.setRGB(1,0.4+Math.sin(t*2+si)*0.3,Math.sin(t*1.5)*0.15);ud.edgeLines.material.opacity=0.5+Math.sin(t*2.5)*0.12;
   ud.glowMesh.material.color.set(0xff8c00);ud.glowMesh.material.opacity=0.3+0.2*Math.sin(t*2.5+si);
  } else if(st==='emerald'){
   ud.ringMesh.material.opacity=0;
   drawHalo(ud.haloCanvas,52,211,153,t*Math.PI*0.8,0.35);ud.haloTex.needsUpdate=true;ud.haloSprite.material.opacity=0.7;
   ud.edgeLines.material.color.set(0x34d399);ud.edgeLines.material.opacity=0.3+0.1*Math.sin(t*1.5+si);
   ud.glowMesh.material.color.set(0x34d399);ud.glowMesh.material.opacity=0.15+0.1*Math.sin(t*1.5+si);
  } else if(st==='gold'){
   ud.ringMesh.material.opacity=0;
   drawHalo(ud.haloCanvas,255,215,0,t*Math.PI*0.6,0.25);ud.haloTex.needsUpdate=true;ud.haloSprite.material.opacity=0.5;
   ud.edgeLines.material.color.set(0xffd700);ud.edgeLines.material.opacity=0.25+0.08*Math.sin(t*1.2+si);
   ud.glowMesh.material.color.set(0xffd700);ud.glowMesh.material.opacity=0.08+0.05*Math.sin(t*1.2+si);
  } else if(st==='silver'){
   ud.ringMesh.material.opacity=0;
   drawHalo(ud.haloCanvas,6,182,212,t*Math.PI*0.5,0.2);ud.haloTex.needsUpdate=true;ud.haloSprite.material.opacity=0.4;
   ud.edgeLines.material.color.set(0x22d3ee);ud.edgeLines.material.opacity=0.2+0.06*Math.sin(t+si);
   ud.glowMesh.material.color.set(0x06b6d4);ud.glowMesh.material.opacity=0.05+0.03*Math.sin(t+si);
  } else {
   ud.glowMesh.material.opacity=0;ud.ringMesh.material.opacity=0;ud.haloSprite.material.opacity=0;
   ud.edgeLines.material.color.set(0xb4b4be);ud.edgeLines.material.opacity=0.12;
  }
 });

 scene.children.forEach(child=>{
  if(child.isPoints&&child.userData.cfg){
   const u=child.userData,p=u.geo.attributes.position.array;
   for(let i=0;i<u.cfg.n;i++){p[i*3+2]+=u.spds[i]*dt;if(p[i*3+2]>u.cfg.d[0]+5){p[i*3+2]=u.cfg.d[1];p[i*3]=(Math.random()-0.5)*u.cfg.w;p[i*3+1]=(Math.random()-0.5)*u.cfg.w*0.7;}}
   u.geo.attributes.position.needsUpdate=true;
  }
 });
 renderer.render(scene,camera);
}
animate();
</script>

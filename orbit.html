<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fusion Square — Swipe Colonnes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:none}
body{background:#12131a;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,sans-serif;user-select:none;color:rgba(180,180,190,0.5)}
canvas{width:100vw;height:100vh;display:block}
.hint{position:fixed;bottom:20px;font-size:0.7rem;letter-spacing:0.1em;opacity:0.4}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hint">← → ↑ ↓ SWIPE 4 DIRECTIONS</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
renderer.setClearColor(0x12131a);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 100);
camera.position.set(0, 0, 8);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

function resize(){
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

// ══ Rounded rect shape ══
function rrShape(w, h, r){
    const s = new THREE.Shape(), hw = w/2, hh = h/2;
    s.moveTo(-hw+r, -hh);
    s.lineTo(hw-r, -hh);
    s.quadraticCurveTo(hw, -hh, hw, -hh+r);
    s.lineTo(hw, hh-r);
    s.quadraticCurveTo(hw, hh, hw-r, hh);
    s.lineTo(-hw+r, hh);
    s.quadraticCurveTo(-hw, hh, -hw, hh-r);
    s.lineTo(-hw, -hh+r);
    s.quadraticCurveTo(-hw, -hh, -hw+r, -hh);
    return s;
}

// ══ Créer un carré 3D (extrudé) ══
const GRID = 5;
const SZ = 0.75, RAD = 0.14, DEPTH = 0.06, GAP = 0.90;

function mkSquare(){
    const g = new THREE.Group();
    const shape = rrShape(SZ, SZ, RAD);
    const extGeo = new THREE.ExtrudeGeometry(shape, {depth: DEPTH, bevelEnabled: false});
    extGeo.translate(0, 0, -DEPTH/2);

    const faceMat = new THREE.MeshBasicMaterial({color: 0x0e0f18, transparent: true, opacity: 0.85});
    const sideMat = new THREE.MeshBasicMaterial({color: 0x141520, transparent: true, opacity: 0.5});
    const mesh = new THREE.Mesh(extGeo, [faceMat, sideMat]);
    g.add(mesh);

    const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(extGeo, 15),
        new THREE.LineBasicMaterial({color: 0xb4b4be, transparent: true, opacity: 0.35})
    );
    g.add(edges);

    g.userData = {edges};
    return g;
}

// ══ Grille 5x5 — chaque carré indépendant ══
const squares = [];
const gridGroup = new THREE.Group();
scene.add(gridGroup);

for(let col = 0; col < GRID; col++){
    for(let row = 0; row < GRID; row++){
        const sq = mkSquare();
        const x = (col - 2) * GAP;
        const y = (2 - row) * GAP;
        sq.position.set(x, y, 0);
        gridGroup.add(sq);
        squares.push({mesh: sq, col, row, baseX: x, baseY: y});
    }
}

// ══ Étoiles (style ADAM) ══
[
    {n:60, d:[-6,-18], sp:1.5, sz:0.12, op:0.4, w:30},
    {n:120, d:[-18,-40], sp:0.8, sz:0.07, op:0.2, w:45},
    {n:200, d:[-40,-70], sp:0.3, sz:0.04, op:0.1, w:60}
].forEach(c => {
    const geo = new THREE.BufferGeometry();
    const pos = new Float32Array(c.n * 3);
    const spds = new Float32Array(c.n);
    for(let i = 0; i < c.n; i++){
        pos[i*3] = (Math.random()-0.5) * c.w;
        pos[i*3+1] = (Math.random()-0.5) * c.w * 0.7;
        pos[i*3+2] = c.d[0] + Math.random() * (c.d[1] - c.d[0]);
        spds[i] = c.sp * (0.5 + Math.random());
    }
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({color: 0x7ec8e3, size: c.sz, transparent: true, opacity: c.op, depthWrite: false});
    const pts = new THREE.Points(geo, mat);
    scene.add(pts);
    pts.userData = {spds, cfg: c, geo};
});

// ══ Animation state ══
let animating = false;
let animAxis = ''; // 'h' ou 'v'
let animDir = 0;   // h: +1=droite, -1=gauche / v: +1=bas, -1=haut
const ANIM_DURATION = 0.7; // durée totale englobante
let animTime = 0;

// Paires d'échange: col/row 0↔4 (extérieures) et 1↔3 (intérieures)
const PAIRS = [[0, 4], [1, 3]];
const ARC_HEIGHT = [1.5, 0.8];
// Déphasage: [delay, durée propre] — intérieure part en premier, extérieure suit
const PAIR_TIMING = [
    {delay: 0.08, duration: 0.65},  // extérieure: part un peu après, plus lente
    {delay: 0.0,  duration: 0.50}   // intérieure: part tout de suite, plus rapide
];

function easeInOutQuart(t){
    return t < 0.5 ? 8*t*t*t*t : 1 - Math.pow(-2*t+2, 4)/2;
}

function startAnim(axis, dir){
    if(animating) return;
    animating = true;
    animAxis = axis;
    animDir = dir;
    animTime = 0;
    squares.forEach(s => {
        s.startX = s.mesh.position.x;
        s.startY = s.mesh.position.y;
        s.startZ = s.mesh.position.z;
    });
}

function getSwapInfo(idx){
    for(let p = 0; p < PAIRS.length; p++){
        if(idx === PAIRS[p][0] || idx === PAIRS[p][1]) return {pairIdx: p, pair: PAIRS[p]};
    }
    return null;
}

function updateAnim(dt){
    if(!animating) return;
    animTime += dt;

    let allDone = true;

    squares.forEach(s => {
        const idx = animAxis === 'h' ? s.col : s.row;
        const info = getSwapInfo(idx);
        if(!info) return;

        const timing = PAIR_TIMING[info.pairIdx];
        const localTime = animTime - timing.delay;
        if(localTime < 0){ allDone = false; return; } // pas encore démarré

        const t = Math.min(localTime / timing.duration, 1);
        if(t < 1) allDone = false;
        const e = easeInOutQuart(t);

        const [a, b] = info.pair;
        const arcH = ARC_HEIGHT[info.pairIdx];
        const isOver = (animDir === 1) ? (idx === b) : (idx === a);
        const zSign = isOver ? 1 : -1;
        const arc = Math.sin(e * Math.PI) * arcH * zSign;

        if(animAxis === 'h'){
            const targetX = -s.startX;
            s.mesh.position.x = s.startX + (targetX - s.startX) * e;
            s.mesh.position.z = arc;
        } else {
            const targetY = -s.startY;
            s.mesh.position.y = s.startY + (targetY - s.startY) * e;
            s.mesh.position.z = arc;
        }
    });

    if(allDone){
        squares.forEach(s => {
            s.mesh.position.z = 0;
            const idx = animAxis === 'h' ? s.col : s.row;
            const info = getSwapInfo(idx);
            if(!info) return;

            const [a, b] = info.pair;
            if(animAxis === 'h'){
                s.baseX = s.mesh.position.x;
                s.col = (s.col === a) ? b : a;
            } else {
                s.baseY = s.mesh.position.y;
                s.row = (s.row === a) ? b : a;
            }
        });
        animating = false;
    }
}

// ══ Pointer / swipe ══
let pStart = null;
window.addEventListener('pointerdown', e => {
    if(animating) return;
    pStart = {x: e.clientX, y: e.clientY};
});
window.addEventListener('pointerup', e => {
    if(!pStart || animating) return;
    const dx = e.clientX - pStart.x;
    const dy = e.clientY - pStart.y;
    const ax = Math.abs(dx), ay = Math.abs(dy);

    if(ax > ay && ax > 40){
        startAnim('h', dx > 0 ? 1 : -1);
    } else if(ay > ax && ay > 40){
        startAnim('v', dy > 0 ? 1 : -1);
    }
    pStart = null;
});
window.addEventListener('pointercancel', () => { pStart = null; });

// Clavier
document.addEventListener('keydown', e => {
    if(e.key === 'ArrowRight')  startAnim('h', 1);
    else if(e.key === 'ArrowLeft')  startAnim('h', -1);
    else if(e.key === 'ArrowDown')  startAnim('v', 1);
    else if(e.key === 'ArrowUp')    startAnim('v', -1);
});

// ══ Render loop ══
const clock = new THREE.Clock();
function animate(){
    requestAnimationFrame(animate);
    const dt = clock.getDelta();
    const t = clock.getElapsedTime();

    updateAnim(dt);

    // Étoiles
    scene.children.forEach(child => {
        if(child.isPoints && child.userData.cfg){
            const u = child.userData;
            const p = u.geo.attributes.position.array;
            for(let i = 0; i < u.cfg.n; i++){
                p[i*3+2] += u.spds[i] * dt;
                if(p[i*3+2] > u.cfg.d[0] + 5){
                    p[i*3+2] = u.cfg.d[1];
                    p[i*3] = (Math.random()-0.5) * u.cfg.w;
                    p[i*3+1] = (Math.random()-0.5) * u.cfg.w * 0.7;
                }
            }
            u.geo.attributes.position.needsUpdate = true;
        }
    });

    // Subtile respiration des bords
    squares.forEach(s => {
        const phase = t * 1.2 + s.col * 1.5 + s.row * 0.8;
        s.mesh.userData.edges.material.opacity = 0.25 + 0.1 * Math.sin(phase);
    });

    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
